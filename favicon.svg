<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Brown background square with rounded corners -->
  <rect width="32" height="32" rx="6" fill="#3E2A1A"/>
  <!-- Yellow border accent top -->
  <rect x="0" y="0" width="32" height="4" rx="2" fill="#F5C518"/>
  <!-- Stylised floor planks -->
  <rect x="4" y="10" width="24" height="4" rx="1" fill="#8B5A2B"/>
  <rect x="4" y="16" width="24" height="4" rx="1" fill="#6B3F1F"/>
  <rect x="4" y="22" width="24" height="4" rx="1" fill="#8B5A2B"/>
  <!-- Plank dividers -->
  <line x1="14" y1="10" x2="14" y2="14" stroke="#3E2A1A" stroke-width="1"/>
  <line x1="20" y1="16" x2="20" y2="20" stroke="#3E2A1A" stroke-width="1"/>
  <line x1="11" y1="22" x2="11" y2="26" stroke="#3E2A1A" stroke-width="1"/>
  <!-- Yellow highlight on top plank -->
  <rect x="4" y="10" width="24" height="1" rx="0" fill="#F5C518" opacity="0.3"/>
</svg>
